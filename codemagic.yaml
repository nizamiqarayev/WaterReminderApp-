workflows:

  ios-sideload-build:
    name: iOS Build (Sideload / AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      xcode: latest
      vars:
        BUNDLE_ID: "com.yourname.yourapp"
        XCODE_SCHEME: "iosApp"
        XCODE_PROJECT: "iosApp/iosApp.xcworkspace"
        # Globally inherited by ALL subprocesses including xcodebuild build phases
        JAVA_HOME: /Library/Java/JavaVirtualMachines/zulu-17.jdk/Contents/Home

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      - name: Set Gradle permissions
        script: chmod +x gradlew

      - name: Verify JAVA_HOME
        script: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          if [ ! -d "$JAVA_HOME" ]; then
            echo "ERROR: JAVA_HOME not found. Available JDKs:"
            ls /Library/Java/JavaVirtualMachines/
            echo "Update JAVA_HOME in codemagic.yaml vars to match one of the above"
            exit 1
          fi

      - name: List Gradle projects
        script: ./gradlew projects

      - name: Generate KMP podspec
        script: ./gradlew :shared:generateDummyFramework

      - name: Install CocoaPods
        script: |
          gem install cocoapods --no-document
          cd iosApp
          pod install --repo-update

      - name: Show embedded Gradle build script from pbxproj
        script: |
          echo "=== Gradle shellScript in Pods.xcodeproj ==="
          grep -A 5 'shellScript' iosApp/Pods/Pods.xcodeproj/project.pbxproj | grep -A 5 'gradlew'

      - name: Show shared pod build script
        script: |
          echo "=== Contents of shared pod support files ==="
          ls "iosApp/Pods/Target Support Files/shared/" || echo "Directory not found"
          for f in "iosApp/Pods/Target Support Files/shared/"*.sh; do
            echo "--- $f ---"
            cat "$f"
          done
        
      - name: Fix composeApp reference in iosApp project
        script: |
          PBXPROJ="iosApp/iosApp.xcodeproj/project.pbxproj"
          grep -q 'composeApp' "$PBXPROJ" && \
            sed -i '' 's/composeApp/shared/g' "$PBXPROJ" && \
            echo "Patched composeApp -> shared" || \
            echo "No composeApp references, skipping"

      # xcodebuild runs [CP-User] Build shared internally.
      # JAVA_HOME from vars above is inherited by all subprocesses.
      - name: Build iOS app (unsigned IPA)
        script: |
          xcodebuild \
            -workspace "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            build || true

          echo "=== Actual executed script ==="
          cat build/ios/Build/Intermediates.noindex/Pods.build/Release-iphoneos/shared.build/Script-*.sh 2>/dev/null || echo "Script file not found"

          echo "=== Re-running script manually with bash -x ==="
          for s in build/ios/Build/Intermediates.noindex/Pods.build/Release-iphoneos/shared.build/Script-*.sh; do
            bash -x "$s" 2>&1 | tail -50
          done

      - name: Package into .ipa
        script: |
          mkdir -p output/Payload
          cp -r "build/ios/Build/Products/Release-iphoneos/$XCODE_SCHEME.app" output/Payload/
          cd output
          zip -r "../$XCODE_SCHEME.ipa" Payload
          cd ..
          echo "IPA ready: $XCODE_SCHEME.ipa"

    artifacts:
      - "*.ipa"
      - build/ios/Build/Products/**/*.app

    publishing:
      email:
        recipients:
          - nizamiqarayev59@gmail.com
        notify:
          success: true
          failure: true