workflows:

  ios-sideload-build:
    name: iOS Build (Sideload / AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2

    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - iosApp/Pods

    environment:
      java: 17
      xcode: latest
      vars:
        BUNDLE_ID: "com.yourname.yourapp"
        XCODE_SCHEME: "iosApp"
        XCODE_PROJECT: "iosApp/iosApp.xcworkspace"
        JAVA_HOME: /Library/Java/JavaVirtualMachines/zulu-17.jdk/Contents/Home

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      - name: Set Gradle permissions
        script: chmod +x gradlew

      - name: Verify JAVA_HOME
        script: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          if [ ! -d "$JAVA_HOME" ]; then
            echo "ERROR: JAVA_HOME not found. Available JDKs:"
            ls /Library/Java/JavaVirtualMachines/
            exit 1
          fi

      - name: List Gradle projects
        script: ./gradlew projects

      - name: Generate shared.podspec
        script: |
          echo "Generating podspec..."
          ./gradlew :shared:podspec
          
          echo "=== Generated podspec ==="
          cat shared/shared.podspec

      - name: Patch podspec with ABSOLUTE paths
        script: |
          PODSPEC="shared/shared.podspec"
          PROJECT_ROOT="$(pwd)"
          
          echo "=== Project root: $PROJECT_ROOT ==="
          
          # Replace with absolute paths
          sed -i '' "s|REPO_ROOT=\"\$SRCROOT/../shared\"|REPO_ROOT=\"$PROJECT_ROOT/shared\"|g" "$PODSPEC"
          sed -i '' "s|REPO_ROOT=\"\$PODS_TARGET_SRCROOT\"|REPO_ROOT=\"$PROJECT_ROOT/shared\"|g" "$PODSPEC"
          
          echo "=== Patched podspec (showing script section) ==="
          sed -n '/script_phases/,/end/p' "$PODSPEC"

      - name: Fix composeApp references in iosApp project
        script: |
          PBXPROJ="iosApp/iosApp.xcodeproj/project.pbxproj"
          
          echo "=== Checking for composeApp references ==="
          grep -n "composeApp" "$PBXPROJ" || echo "No composeApp references found"
          
          # Replace composeApp with shared
          if grep -q "composeApp" "$PBXPROJ"; then
            sed -i '' 's/:composeApp:/:shared:/g' "$PBXPROJ"
            sed -i '' 's/composeApp/shared/g' "$PBXPROJ"
            
            echo "=== Patched composeApp -> shared ==="
            grep -n "shared" "$PBXPROJ" | head -20
          else
            echo "No patching needed"
          fi

      - name: Install CocoaPods (with retry)
        script: |
          cd iosApp
          
          MAX_ATTEMPTS=5
          ATTEMPT=1
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "=== CocoaPods install attempt $ATTEMPT/$MAX_ATTEMPTS ==="
            
            if pod install --repo-update; then
              echo "✅ CocoaPods installation succeeded"
              exit 0
            else
              echo "❌ Attempt $ATTEMPT failed"
              
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                WAIT_TIME=$((ATTEMPT * 30))
                echo "Waiting ${WAIT_TIME}s before retry..."
                sleep $WAIT_TIME
              fi
              
              ATTEMPT=$((ATTEMPT + 1))
            fi
          done
          
          echo "❌ CocoaPods installation failed after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Build iOS app (unsigned IPA)
        script: |
          xcodebuild \
            -workspace "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            build

      - name: Package into .ipa
        script: |
          mkdir -p output/Payload
          cp -r "build/ios/Build/Products/Release-iphoneos/$XCODE_SCHEME.app" output/Payload/
          cd output
          zip -r "../$XCODE_SCHEME.ipa" Payload
          cd ..
          echo "IPA ready: $XCODE_SCHEME.ipa"

    artifacts:
      - "*.ipa"
      - build/ios/Build/Products/**/*.app

    publishing:
      email:
        recipients:
          - nizamiqarayev59@gmail.com
        notify:
          success: true
          failure: true