workflows:
  ios-sideload-build:
    name: iOS Build (Sideload / AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2

    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - iosApp/Pods

    environment:
      java: 17
      xcode: latest
      vars:
        BUNDLE_ID: "com.yourname.yourapp"
        XCODE_SCHEME: "iosApp"
        XCODE_PROJECT: "iosApp/iosApp.xcworkspace"
        JAVA_HOME: /Library/Java/JavaVirtualMachines/zulu-17.jdk/Contents/Home

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set Gradle permissions
        script: chmod +x gradlew

      - name: Verify JAVA_HOME
        script: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name: List Gradle projects
        script: ./gradlew projects

      - name: Generate shared.podspec
        script: |
          ./gradlew :shared:podspec
          cat shared/shared.podspec

      - name: Patch podspec with ABSOLUTE paths
        script: |
          PODSPEC="shared/shared.podspec"
          PROJECT_ROOT="$(pwd)"

          sed -i '' "s|REPO_ROOT=\"\$SRCROOT/../shared\"|REPO_ROOT=\"$PROJECT_ROOT/shared\"|g" "$PODSPEC"
          sed -i '' "s|REPO_ROOT=\"\$PODS_TARGET_SRCROOT\"|REPO_ROOT=\"$PROJECT_ROOT/shared\"|g" "$PODSPEC"

          echo "=== Patched podspec ==="
          sed -n '/script_phases/,/end/p' "$PODSPEC"

      - name: Fix composeApp references in project
        script: |
          PBXPROJ="iosApp/iosApp.xcodeproj/project.pbxproj"

          if grep -q "composeApp" "$PBXPROJ"; then
            sed -i '' 's/:composeApp:/:shared:/g' "$PBXPROJ"
            sed -i '' 's/composeApp/shared/g' "$PBXPROJ"
            echo "Patched composeApp -> shared"
          fi

      - name: Check original ContentView
        script: |
          echo "=== Original ContentView.swift ==="
          cat iosApp/iosApp/ContentView.swift

      - name: Replace ContentView with SwiftUI version
        script: |
          cat > iosApp/iosApp/ContentView.swift <<'SWIFTCODE'
          import UIKit
          import SwiftUI
          import shared

          struct ContentView: View {
              var body: some View {
                  NavigationView {
                      VStack(spacing: 20) {
                          Image(systemName: "drop.fill")
                              .resizable()
                              .frame(width: 100, height: 100)
                              .foregroundStyle(.blue)
                          
                          Text("Water Reminder")
                              .font(.largeTitle)
                              .fontWeight(.bold)
                          
                          Text("iOS Build Successful! ✅")
                              .font(.title2)
                              .foregroundColor(.green)
                          
                          Text("Kotlin Shared Module Loaded")
                              .font(.caption)
                              .foregroundColor(.gray)
                      }
                      .padding()
                      .navigationTitle("WaterReminder")
                  }
              }
          }

          #Preview {
              ContentView()
          }
          SWIFTCODE

          echo "=== New ContentView.swift ==="
          cat iosApp/iosApp/ContentView.swift

      - name: Install CocoaPods (with retry)
        script: |
          cd iosApp

          MAX_ATTEMPTS=5
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "=== Attempt $ATTEMPT/$MAX_ATTEMPTS ==="
            
            if pod install --repo-update; then
              echo "✅ Success"
              exit 0
            fi
            
            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              sleep $((ATTEMPT * 30))
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
          done

          exit 1

      - name: Build iOS app
        script: |
          xcodebuild \
            -workspace "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            build

      - name: Package IPA
        script: |
          mkdir -p output/Payload
          cp -r "build/ios/Build/Products/Release-iphoneos/$XCODE_SCHEME.app" output/Payload/
          cd output
          zip -r "../$XCODE_SCHEME.ipa" Payload
          cd ..
          echo "✅ IPA ready: $XCODE_SCHEME.ipa"

    artifacts:
      - "*.ipa"
      - build/ios/Build/Products/**/*.app

    publishing:
      email:
        recipients:
          - nizamiqarayev59@gmail.com
        notify:
          success: true
          failure: true
