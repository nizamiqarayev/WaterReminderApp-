workflows:

  ios-sideload-build:
    name: iOS Build (Sideload / AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      xcode: latest
      vars:
        BUNDLE_ID: "com.yourname.yourapp"
        XCODE_SCHEME: "iosApp"
        XCODE_PROJECT: "iosApp/iosApp.xcworkspace"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      - name: Set Gradle permissions
        script: chmod +x gradlew

      - name: Check environment
        script: |
          xcodebuild -version
          java -version
          ./gradlew --version

      - name: List Gradle projects
        script: ./gradlew projects

      - name: Generate KMP podspec
        script: ./gradlew :shared:generateDummyFramework

      - name: Install CocoaPods
        script: |
          gem install cocoapods --no-document
          cd iosApp
          pod install --repo-update

      - name: Patch shared pod script with JAVA_HOME
        script: |
          JAVA_HOME_VAL=$(/usr/libexec/java_home)
          echo "JAVA_HOME = $JAVA_HOME_VAL"
          SUPPORT_DIR="iosApp/Pods/Target Support Files/shared"
          for f in "$SUPPORT_DIR"/*.sh; do
            echo "Checking: $f"
            if grep -q 'gradlew' "$f" && ! grep -q 'JAVA_HOME' "$f"; then
              echo "Patching: $f"
              HEADER="#!/bin/sh\nexport JAVA_HOME=\"$JAVA_HOME_VAL\"\nexport PATH=\"\$JAVA_HOME/bin:\$PATH\""
              BODY=$(tail -n +2 "$f")
              printf "%b\n%s" "$HEADER" "$BODY" > "$f"
              echo "Done. Result:"
              cat "$f"
            fi
          done

      - name: Build iOS app (unsigned IPA)
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home)
          xcodebuild \
            -workspace "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            JAVA_HOME="$JAVA_HOME" \
            build

      - name: Package into .ipa
        script: |
          mkdir -p output/Payload
          cp -r "build/ios/Build/Products/Release-iphoneos/$XCODE_SCHEME.app" output/Payload/
          cd output
          zip -r "../$XCODE_SCHEME.ipa" Payload
          cd ..
          echo "IPA ready: $XCODE_SCHEME.ipa"

    artifacts:
      - "*.ipa"
      - build/ios/Build/Products/**/*.app

    publishing:
      email:
        recipients:
          - nizamiqarayev59@gmail.com
        notify:
          success: true
          failure: true