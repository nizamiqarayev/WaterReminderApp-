workflows:

  ios-sideload-build:
    name: iOS Build (Sideload / AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2   # Free tier eligible

    # ─── Environment ────────────────────────────────────────────────
    environment:
      java: 17
      xcode: latest
      vars:
        # Your iOS app bundle ID — must match Xcode project exactly
        BUNDLE_ID: "com.yourname.yourapp"
        # Name of your Xcode scheme (usually same as your app name)
        XCODE_SCHEME: "iosApp"
        # Path to your .xcodeproj or .xcworkspace (relative to repo root)
        # ⚠️ After pod install you MUST use .xcworkspace, not .xcodeproj
        XCODE_PROJECT: "iosApp/iosApp.xcworkspace"

    # ─── Triggering (optional) ──────────────────────────────────────
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    # ─── Build Steps ────────────────────────────────────────────────
    scripts:

      # 1. Make gradlew executable FIRST (must be before any ./gradlew call)
      - name: Set Gradle permissions
        script: chmod +x gradlew

      # 2. Print environment info for debugging
      - name: Check environment
        script: |
          echo "Xcode version:"
          xcodebuild -version
          echo "Java version:"
          java -version
          echo "Kotlin/Gradle version:"
          ./gradlew --version

      # 3. Show all Gradle modules (useful for debugging missing modules)
      - name: List Gradle projects
        script: ./gradlew projects


      # 4. Generate the podspec from the shared KMP module
      - name: Generate KMP podspec
        script: ./gradlew :shared:generateDummyFramework

      # 5. Install CocoaPods — fetches FirebaseCore, FirebaseAuth, FirebaseFirestore etc.
      - name: Install CocoaPods
        script: |
          gem install cocoapods --no-document
          cd iosApp
          pod install --repo-update

      # 6. Build iOS app — xcodebuild will automatically trigger
      #    :shared:linkPodReleaseFrameworkIosArm64 with the correct
      #    Firebase framework search paths from CocoaPods
      - name: Build iOS app (unsigned IPA)
        script: |
          xcodebuild \
            -workspace "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            build

      # 6. Package .app into an unsigned .ipa
      #    AltStore / Sideloadly can re-sign this with your free Apple ID
      - name: Package into .ipa
        script: |
          mkdir -p output/Payload
          cp -r "build/ios/Build/Products/Release-iphoneos/$XCODE_SCHEME.app" \
            output/Payload/
          cd output
          zip -r "../$XCODE_SCHEME.ipa" Payload
          cd ..
          echo "✅ IPA created: $XCODE_SCHEME.ipa"

    # ─── Artifacts (files Codemagic will save & let you download) ───
    artifacts:
      - "*.ipa"
      - build/ios/Build/Products/**/*.app

    # ─── Notifications ──────────────────────────────────────────────
    publishing:
      email:
        recipients:
          - nizamiqarayev59@gmail.com   # ← Change this
        notify:
          success: true
          failure: true