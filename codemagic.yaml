workflows:

  ios-sideload-build:
    name: iOS Build (Sideload / AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      xcode: latest
      vars:
        BUNDLE_ID: "com.yourname.yourapp"
        XCODE_SCHEME: "iosApp"
        XCODE_PROJECT: "iosApp/iosApp.xcworkspace"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      - name: Set Gradle permissions
        script: chmod +x gradlew

      - name: Check environment
        script: |
          xcodebuild -version
          java -version
          ./gradlew --version

      - name: List Gradle projects
        script: ./gradlew projects

      - name: Generate KMP podspec
        script: ./gradlew :shared:generateDummyFramework

      - name: Install CocoaPods
        script: |
          gem install cocoapods --no-document
          cd iosApp
          pod install --repo-update

      - name: Fix composeApp reference in iosApp project
        script: |
          PBXPROJ="iosApp/iosApp.xcodeproj/project.pbxproj"
          grep -q 'composeApp' "$PBXPROJ" && \
            sed -i '' 's/composeApp/shared/g' "$PBXPROJ" && \
            echo "Patched composeApp -> shared" || \
            echo "No composeApp references found"

      - name: Inject JAVA_HOME into shared pod build phase
        script: |
          JAVA_HOME_VAL=$(/usr/libexec/java_home)
          echo "Injecting JAVA_HOME: $JAVA_HOME_VAL"

          # Use xcodeproj gem (already installed with CocoaPods) to safely
          # patch the shellScript without corrupting pbxproj JSON escaping
          ruby - "$JAVA_HOME_VAL" << 'RUBYEOF'
          require 'xcodeproj'
          java_home = ARGV[0]
          injection = "export JAVA_HOME=\"#{java_home}\"\nexport PATH=\"$JAVA_HOME/bin:$PATH\"\n"

          project = Xcodeproj::Project.open('iosApp/Pods/Pods.xcodeproj')
          project.targets.each do |target|
            next unless target.name == 'shared'
            target.build_phases.each do |phase|
              next unless phase.is_a?(Xcodeproj::Project::Object::PBXShellScriptBuildPhase)
              next unless phase.shell_script&.include?('gradlew')
              unless phase.shell_script.include?('JAVA_HOME')
                puts "Patching build phase: #{phase.display_name}"
                phase.shell_script = injection + phase.shell_script
                puts "Done."
              end
            end
          end
          project.save
          RUBYEOF

      - name: Build iOS app (unsigned IPA)
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home)
          export PATH="$JAVA_HOME/bin:$PATH"

          xcodebuild \
            -workspace "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            build

      - name: Package into .ipa
        script: |
          mkdir -p output/Payload
          cp -r "build/ios/Build/Products/Release-iphoneos/$XCODE_SCHEME.app" output/Payload/
          cd output
          zip -r "../$XCODE_SCHEME.ipa" Payload
          cd ..
          echo "IPA ready: $XCODE_SCHEME.ipa"

    artifacts:
      - "*.ipa"
      - build/ios/Build/Products/**/*.app

    publishing:
      email:
        recipients:
          - nizamiqarayev59@gmail.com
        notify:
          success: true
          failure: true