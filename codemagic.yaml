workflows:

  ios-sideload-build:
    name: iOS Build (Sideload / AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      xcode: latest
      vars:
        BUNDLE_ID: "com.yourname.yourapp"
        XCODE_SCHEME: "iosApp"
        XCODE_PROJECT: "iosApp/iosApp.xcworkspace"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      - name: Set Gradle permissions
        script: chmod +x gradlew

      - name: Check environment
        script: |
          xcodebuild -version
          java -version
          ./gradlew --version

      - name: List Gradle projects
        script: ./gradlew projects

      - name: Generate KMP podspec
        script: ./gradlew :shared:generateDummyFramework

      - name: Install CocoaPods
        script: |
          gem install cocoapods --no-document
          cd iosApp
          pod install --repo-update

      - name: Patch pbxproj Gradle script with JAVA_HOME
        script: |
          JAVA_HOME_VAL=$(/usr/libexec/java_home)
          PBXPROJ="iosApp/Pods/Pods.xcodeproj/project.pbxproj"

          echo "=== Searching pbxproj for gradlew references ==="
          grep -n 'gradlew' "$PBXPROJ" || echo "WARNING: No gradlew found in pbxproj!"

          echo "=== Patching pbxproj ==="
          # The shellScript in pbxproj is a JSON-escaped string on one line.
          # We inject JAVA_HOME at the very start of the script content.
          # The pattern finds shellScript = "..." lines containing gradlew.
          sed -i '' "s|shellScript = \"|shellScript = \"export JAVA_HOME=\\\\\\\\\"$JAVA_HOME_VAL\\\\\\\\\"; export PATH=\\\\\\\\\"\$JAVA_HOME/bin:\$PATH\\\\\\\\\"; |g" "$PBXPROJ"

          echo "=== Verifying patch ==="
          grep -n 'JAVA_HOME' "$PBXPROJ" && echo "Patch successful!" || echo "WARNING: Patch may have failed"

      - name: Build iOS app (unsigned IPA)
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home)
          export PATH="$JAVA_HOME/bin:$PATH"

          xcodebuild \
            -workspace "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            JAVA_HOME="$JAVA_HOME" \
            build 2>&1 | tee /tmp/xcodebuild.log
          EXIT_CODE=${PIPESTATUS[0]}

          # Print any script phase output that might be hidden
          echo "=== Searching for Gradle errors in build log ==="
          grep -A 5 'Build shared\|gradlew\|JAVA_HOME\|error:\|FAILED' /tmp/xcodebuild.log | tail -50

          exit $EXIT_CODE

      - name: Package into .ipa
        script: |
          mkdir -p output/Payload
          cp -r "build/ios/Build/Products/Release-iphoneos/$XCODE_SCHEME.app" output/Payload/
          cd output
          zip -r "../$XCODE_SCHEME.ipa" Payload
          cd ..
          echo "IPA ready: $XCODE_SCHEME.ipa"

    artifacts:
      - "*.ipa"
      - build/ios/Build/Products/**/*.app

    publishing:
      email:
        recipients:
          - nizamiqarayev59@gmail.com
        notify:
          success: true
          failure: true