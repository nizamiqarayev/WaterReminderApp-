workflows:

  ios-sideload-build:
    name: iOS Build (Sideload / AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      xcode: latest
      vars:
        BUNDLE_ID: "com.yourname.yourapp"
        XCODE_SCHEME: "iosApp"
        XCODE_PROJECT: "iosApp/iosApp.xcworkspace"
        JAVA_HOME: /Library/Java/JavaVirtualMachines/zulu-17.jdk/Contents/Home

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      - name: Set Gradle permissions
        script: chmod +x gradlew

      - name: Verify JAVA_HOME
        script: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          if [ ! -d "$JAVA_HOME" ]; then
            echo "ERROR: JAVA_HOME not found. Available JDKs:"
            ls /Library/Java/JavaVirtualMachines/
            echo "Update JAVA_HOME in codemagic.yaml vars to match one of the above"
            exit 1
          fi

      - name: List Gradle projects
        script: ./gradlew projects

      - name: Generate shared.podspec
        script: |
          echo "Generating podspec..."
          ./gradlew :shared:podspec
          
          echo "=== Generated podspec ==="
          cat shared/shared.podspec

      - name: Patch podspec for Codemagic environment
        script: |
          PODSPEC="shared/shared.podspec"
          
          echo "=== Before patching ==="
          grep "REPO_ROOT" "$PODSPEC" || true
          
          # Replace PODS_TARGET_SRCROOT with SRCROOT-based path
          sed -i '' 's|REPO_ROOT="\$PODS_TARGET_SRCROOT"|REPO_ROOT="\$SRCROOT/../shared"|g' "$PODSPEC"
          
          echo "=== After patching ==="
          grep "REPO_ROOT" "$PODSPEC" || true
          
          echo "=== Full script_phases section ==="
          sed -n '/script_phases/,/end/p' "$PODSPEC"

      - name: Install CocoaPods
        script: |
          cd iosApp
          pod install --repo-update

      - name: Verify installation
        script: |
          echo "=== Checking shared pod ==="
          ls -la iosApp/Pods/shared/ || echo "shared pod directory not found"
          
          echo "=== Generated build script content ==="
          SCRIPT_DIR="iosApp/Pods/Target Support Files/shared"
          if [ -d "$SCRIPT_DIR" ]; then
            for script in "$SCRIPT_DIR"/*.sh; do
              if [ -f "$script" ]; then
                echo "--- Content of $script ---"
                cat "$script"
                echo ""
              fi
            done
          fi

      - name: Test Gradle syncFramework manually
        script: |
          echo "=== Testing Gradle command manually before xcodebuild ==="
          cd shared
          ../gradlew :shared:syncFramework \
            -Pkotlin.native.cocoapods.platform=iphoneos \
            -Pkotlin.native.cocoapods.archs="arm64" \
            -Pkotlin.native.cocoapods.configuration="Release" || {
              echo "Gradle syncFramework FAILED"
              exit 1
            }
          cd ..
          echo "=== Gradle syncFramework succeeded ==="

      - name: Build iOS app (unsigned IPA)
        script: |
          set -e
          set -o pipefail
          
          xcodebuild \
            -workspace "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            build 2>&1 | tee build.log || {
              echo ""
              echo "=== BUILD FAILED - Showing last 100 lines ==="
              tail -100 build.log
              
              echo ""
              echo "=== Checking generated script that failed ==="
              SCRIPT_FILE=$(find build/ios/Build/Intermediates.noindex/Pods.build/Release-iphoneos/shared.build -name "Script-*.sh" | head -1)
              if [ -f "$SCRIPT_FILE" ]; then
                echo "--- Content of failed script: $SCRIPT_FILE ---"
                cat "$SCRIPT_FILE"
                
                echo ""
                echo "=== Running script manually with bash -x ==="
                cd iosApp
                bash -x "$SCRIPT_FILE" 2>&1 | tail -50 || true
                cd ..
              fi
              
              exit 1
            }

      - name: Package into .ipa
        script: |
          mkdir -p output/Payload
          cp -r "build/ios/Build/Products/Release-iphoneos/$XCODE_SCHEME.app" output/Payload/
          cd output
          zip -r "../$XCODE_SCHEME.ipa" Payload
          cd ..
          echo "IPA ready: $XCODE_SCHEME.ipa"

    artifacts:
      - "*.ipa"
      - build/ios/Build/Products/**/*.app
      - build.log

    publishing:
      email:
        recipients:
          - nizamiqarayev59@gmail.com
        notify:
          success: true
          failure: true