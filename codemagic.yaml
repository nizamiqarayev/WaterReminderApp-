workflows:

  ios-sideload-build:
    name: iOS Build (Sideload / AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      xcode: latest
      vars:
        BUNDLE_ID: "com.yourname.yourapp"
        XCODE_SCHEME: "iosApp"
        XCODE_PROJECT: "iosApp/iosApp.xcworkspace"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      - name: Set Gradle permissions
        script: chmod +x gradlew

      - name: Check environment
        script: |
          xcodebuild -version
          java -version
          ./gradlew --version

      - name: List Gradle projects
        script: ./gradlew projects

      - name: Generate KMP podspec
        script: ./gradlew :shared:generateDummyFramework

      - name: Install CocoaPods
        script: |
          gem install cocoapods --no-document
          cd iosApp
          pod install --repo-update

      # Fix: the iosApp Xcode project from KMP Wizard hardcodes 'composeApp'
      # but this project's module is named 'shared' — patch it here.
      - name: Fix composeApp -> shared in iosApp Xcode project
        script: |
          PBXPROJ="iosApp/iosApp.xcodeproj/project.pbxproj"
          echo "=== Before patch ==="
          grep -n 'composeApp' "$PBXPROJ" || echo "No composeApp references found"
          sed -i '' 's/composeApp/shared/g' "$PBXPROJ"
          echo "=== After patch ==="
          grep -n 'shared' "$PBXPROJ" | grep -i 'embed\|kotlin\|framework' || echo "Done"

      - name: Build iOS app (unsigned IPA)
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home)
          export PATH="$JAVA_HOME/bin:$PATH"

          xcodebuild \
            -workspace "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            build

      - name: Package into .ipa
        script: |
          mkdir -p output/Payload
          cp -r "build/ios/Build/Products/Release-iphoneos/$XCODE_SCHEME.app" output/Payload/
          cd output
          zip -r "../$XCODE_SCHEME.ipa" Payload
          cd ..
          echo "IPA ready: $XCODE_SCHEME.ipa"

    artifacts:
      - "*.ipa"
      - build/ios/Build/Products/**/*.app

    publishing:
      email:
        recipients:
          - nizamiqarayev59@gmail.com
        notify:
          success: true
          failure: true