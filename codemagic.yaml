workflows:

  ios-sideload-build:
    name: iOS Build (Sideload / AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      xcode: 16.1
      vars:
        BUNDLE_ID: "com.example.waterreminder"
        XCODE_SCHEME: "iosApp"
        XCODE_PROJECT: "iosApp/iosApp.xcworkspace"
        JAVA_HOME: /Library/Java/JavaVirtualMachines/zulu-17.jdk/Contents/Home
        # These flags sometimes help clang in cinterop find the right headers
        C_INCLUDE_PATH: /Applications/Xcode-16.1.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk/usr/include

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      - name: Set Gradle permissions
        script: chmod +x gradlew

      - name: Verify JAVA_HOME
        script: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          # If the zulu-17 path doesn't exist, find the correct one and fail loudly
          if [ ! -d "$JAVA_HOME" ]; then
            echo "ERROR: JAVA_HOME path does not exist: $JAVA_HOME"
            echo "Available JDKs:"
            ls /Library/Java/JavaVirtualMachines/
            echo "Update the JAVA_HOME var in codemagic.yaml to match one of the above"
            exit 1
          fi

      - name: List Gradle projects
        script: ./gradlew projects

      - name: Generate KMP podspec
        script: ./gradlew :shared:generateDummyFramework

      - name: Install CocoaPods
        script: |
          gem install cocoapods --no-document
          cd iosApp
          pod install --repo-update

      - name: Fix composeApp reference in iosApp project
        script: |
          PBXPROJ="iosApp/iosApp.xcodeproj/project.pbxproj"
          grep -q 'composeApp' "$PBXPROJ" && \
            sed -i '' 's/composeApp/shared/g' "$PBXPROJ" && \
            echo "Patched composeApp -> shared" || \
            echo "No composeApp references, skipping"

      # Run the KMP Gradle build manually BEFORE xcodebuild.
      # This pre-builds the shared.framework so when xcodebuild hits the
      # [CP-User] Build shared phase, the framework already exists and
      # Gradle either skips or succeeds instantly.
      - name: Pre-build KMP shared framework
        script: |
          echo "JAVA_HOME=$JAVA_HOME"
          export PATH="$JAVA_HOME/bin:$PATH"
          ./gradlew :shared:linkPodReleaseFrameworkIosArm64 \
            -Pkotlin.native.preconfigured.headers.enabled=false

      - name: Build iOS app (unsigned IPA)
        script: |
          sudo xcode-select -s /Applications/Xcode-16.1.app/Contents/Developer
          echo "JAVA_HOME=$JAVA_HOME"
          export PATH="$JAVA_HOME/bin:$PATH"

          xcodebuild \
            -workspace "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            build

      - name: Package into .ipa
        script: |
          mkdir -p output/Payload
          cp -r "build/ios/Build/Products/Release-iphoneos/$XCODE_SCHEME.app" output/Payload/
          cd output
          zip -r "../$XCODE_SCHEME.ipa" Payload
          cd ..
          echo "IPA ready: $XCODE_SCHEME.ipa"

    artifacts:
      - "*.ipa"
      - build/ios/Build/Products/**/*.app

    publishing:
      email:
        recipients:
          - nizamiqarayev59@gmail.com
        notify:
          success: true
          failure: true